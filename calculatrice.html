<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
	<div id="app">
		{{message}}
	</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
	const {createApp, ref}=Vue;
	const app = createApp({
		setup () {
			const message = ref("coucou");
			return {
				message
			}
		}
	});
	app.mount("#app")

	console.log("test");
</script>
</body>
</html>
