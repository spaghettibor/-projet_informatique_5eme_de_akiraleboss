<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
	<div id="app">
		<!-- {{message}} -->
		<button @click ="updateValues('0')">0</button>
		<button @click ="updateValues('1')">1</button>
		<button @click ="updateValues('2')">2</button>
		<button @click ="updateValues('3')">3</button>
		<button @click ="updateValues('4')">4</button>
		<button @click ="updateValues('5') ">5</button>
		<button @click ="updateValues('6')">6</button>
		<button @click ="updateValues('7')">7</button>
		<button @click ="updateValues('8')">8</button>
		<button @click ="updateValues('9') ">9</button>

		<br>
		<button @click ="operation = '+' ">+</button>
		<button @click ="operation = '-' ">-</button>
		<button @click ="operation = '/' ">/</button>
		<button @click ="operation = '*' ">*</button>
		<br>
		<button @click ="calculate">=</button>
		First number : {{firstNumber}}
		Second number : {{secondNumber}}
		Operation : {{operation}}
		result : {{result}}
	</div>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
	const {createApp, ref}=Vue;
	const app = createApp({
		setup () {
			const message = ref("coucou");
			const firstNumber = ref("0");
			const operation = ref("");
			const secondNumber = ref("0");
			const result = ref("");
			const updateValues = function(value) {
				console.log("hello")
				if (operation.value == ""){
					firstNumber.value += value;
				}else{
					secondNumber.value += value;
				}
			};
			const calculate = function (){
				switch (operation.value){
					case "+":
						result.value = parseInt(firstNumber.value) + parseInt(secondNumber.value);
					break;
					case "-":
						result.value = parseInt(firstNumber.value) - parseInt(secondNumber.value);
					break;
					case "/":
						result.value = parseInt(firstNumber.value) / parseInt(secondNumber.value);
					break;
					case "*":
						result.value = parseInt(firstNumber.value) * parseInt(secondNumber.value);
					break;
				}

			};
			return {
				message,
				firstNumber,
				operation,
				secondNumber,
				updateValues,
				calculate,
				result
			}
		}
	});
	app.mount("#app")

</script>
</body>
</html>
